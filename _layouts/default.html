<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  <script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']]
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% if page.ap_widget %}
<link rel="stylesheet" href="{{ '/LLMheatmap/ap-heatmap.css' | relative_url }}">
<script src="{{ '/LLMheatmap/ap-heatmap.js' | relative_url }}"></script>
{% endif %}
</head>
<body>
  <main>
    {{ content }}
  </main>
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('main img').forEach(function (img) {
    if (img.closest('.ap-heatmap-widget') || img.closest('.project-card-image')) return;
    img.style.cursor = 'zoom-in';
    img.addEventListener('click', function () {
      var overlay = document.createElement('div');
      overlay.style.position   = 'fixed';
      overlay.style.top        = '0';
      overlay.style.right      = '0';
      overlay.style.bottom     = '0';
      overlay.style.left       = '0';
      overlay.style.background = 'rgba(0,0,0,0.92)';
      overlay.style.display    = 'flex';
      overlay.style.alignItems = 'center';
      overlay.style.justifyContent = 'center';
      overlay.style.zIndex    = '9999';
      overlay.style.cursor    = 'zoom-out';

      var big = document.createElement('img');
      big.src            = img.src;
      big.style.maxWidth  = '90vw';
      big.style.maxHeight = '90vh';
      big.style.width     = 'auto';
      big.style.height    = 'auto';
      big.style.margin    = '0';
      big.style.boxShadow = '0 0 60px rgba(0,0,0,0.8)';
      big.style.cursor    = 'zoom-out';
      big.addEventListener('click', function (e) { e.stopPropagation(); close(); });

      function close() { if (overlay.parentNode) document.body.removeChild(overlay); }
      overlay.addEventListener('click', close);
      document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
      });

      overlay.appendChild(big);
      document.body.appendChild(overlay);
    });
  });
});
</script>
</body>
</html>
