<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  <script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']]
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% if page.ap_widget %}
<link rel="stylesheet" href="{{ '/LLMheatmap/ap-heatmap.css' | relative_url }}">
<script src="{{ '/LLMheatmap/ap-heatmap.js' | relative_url }}"></script>
{% endif %}
</head>
<body>
  <main>
    {{ content }}
  </main>
<script>
document.addEventListener('DOMContentLoaded', function () {
  // Lightbox for article images — skip widget, project card, and lightbox images
  document.querySelectorAll('main img').forEach(function (img) {
    if (img.closest('.ap-heatmap-widget') || img.closest('.project-card-image') || img.closest('.img-lightbox-overlay')) return;
    img.style.cursor = 'zoom-in';
    img.addEventListener('click', function () {
      var overlay = document.createElement('div');
      overlay.className = 'img-lightbox-overlay';
      var big = document.createElement('img');
      big.src = img.src;
      overlay.appendChild(big);
      overlay.addEventListener('click', function () { document.body.removeChild(overlay); });
      document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { document.body.removeChild(overlay); document.removeEventListener('keydown', esc); }
      });
      document.body.appendChild(overlay);
    });
  });
});
</script>
</body>
</html>
